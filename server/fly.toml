app = "trio-cloud"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/trio.db"
  BASE_URL = "https://trio-cloud.fly.dev"

[mounts]
  source = "trio_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
